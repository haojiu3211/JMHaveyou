<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebView JS 交互测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .btn-info {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .btn-warning {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        button:active {
            transform: scale(0.98);
        }

        .log {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .log-item {
            padding: 5px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .log-item:last-child {
            border-bottom: none;
        }

        .log-time {
            color: #999;
            margin-right: 10px;
        }

        .log-success {
            color: #11998e;
        }

        .log-error {
            color: #fa709a;
        }

        .log-info {
            color: #4facfe;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔗 WebView JS 交互测试</h1>

        <!-- JS 调用原生 -->
        <div class="card">
            <h2>📱 JS 调用原生方法</h2>
            <button class="btn-primary" onclick="callNativeTest1()">
                调用原生 test1 方法
            </button>
            <button class="btn-success" onclick="callNativeTest1WithParams()">
                调用 test1（带参数）
            </button>
            <button class="btn-warning" onclick="callNativeGoBack()">
                调用原生返回（goBack）
            </button>
            <input type="text" id="messageInput" placeholder="输入要发送的消息">
            <button class="btn-info" onclick="callNativeWithInput()">
                发送自定义消息
            </button>
        </div>

        <!-- 原生调用 JS -->
        <div class="card">
            <h2>📲 原生调用 JS 方法</h2>
            <p style="color: #666; font-size: 14px; margin-bottom: 10px;">
                这些方法可以被原生代码调用
            </p>
            <button class="btn-warning" onclick="testJSFunction()">
                测试 JS 函数
            </button>
        </div>

        <!-- 日志 -->
        <div class="card">
            <h2>📝 调用日志</h2>
            <div class="log" id="logContainer">
                <div class="log-item log-info">
                    <span class="log-time">--:--:--</span>
                    <span>等待调用...</span>
                </div>
            </div>
            <button class="btn-warning" onclick="clearLog()" style="margin-top: 10px;">
                清空日志
            </button>
        </div>
    </div>

    <script>
        // ==================== 工具函数 ====================

        function addLog(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const time = new Date().toLocaleTimeString();
            const logItem = document.createElement('div');
            logItem.className = `log-item log-${type}`;
            logItem.innerHTML = `<span class="log-time">${time}</span><span>${message}</span>`;
            logContainer.appendChild(logItem);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function clearLog() {
            const logContainer = document.getElementById('logContainer');
            logContainer.innerHTML = '<div class="log-item log-info"><span class="log-time">--:--:--</span><span>日志已清空</span></div>';
        }

        // ==================== JS 调用原生 ====================

        function callNativeTest1() {
            try {
                addLog('📤 调用原生 test1 方法（无参数）', 'info');
                window.webkit.messageHandlers.test1.postMessage({});
                addLog('✅ 调用成功', 'success');
            } catch (error) {
                addLog('❌ 调用失败: ' + error.message, 'error');
            }
        }

        function callNativeTest1WithParams() {
            try {
                const params = {
                    message: '来自 JS 的问候',
                    timestamp: Date.now(),
                    data: {
                        userId: '12345',
                        userName: '张三'
                    }
                };
                addLog('📤 调用原生 test1 方法（带参数）', 'info');
                addLog('📦 参数: ' + JSON.stringify(params), 'info');
                window.webkit.messageHandlers.test1.postMessage(params);
                addLog('✅ 调用成功', 'success');
            } catch (error) {
                addLog('❌ 调用失败: ' + error.message, 'error');
            }
        }

        function callNativeWithInput() {
            try {
                const message = document.getElementById('messageInput').value;
                if (!message) {
                    alert('请输入消息');
                    return;
                }
                const params = {
                    message: message,
                    timestamp: Date.now()
                };
                addLog('📤 发送自定义消息: ' + message, 'info');
                window.webkit.messageHandlers.test1.postMessage(params);
                addLog('✅ 发送成功', 'success');
                document.getElementById('messageInput').value = '';
            } catch (error) {
                addLog('❌ 发送失败: ' + error.message, 'error');
            }
        }

        function callNativeGoBack() {
            try {
                addLog('📤 调用原生 goBack 方法', 'info');
                window.webkit.messageHandlers.goBack.postMessage({});
                addLog('✅ 调用成功，即将返回', 'success');
            } catch (error) {
                addLog('❌ 调用失败: ' + error.message, 'error');
            }
        }

        // ==================== 原生调用 JS ====================

        // 这个方法可以被原生代码调用
        function test(params) {
            addLog('📥 原生调用了 test 方法', 'success');
            addLog('📦 收到参数: ' + JSON.stringify(params), 'info');
            return {
                success: true,
                message: 'test 方法执行成功',
                receivedParams: params
            };
        }

        // 这个方法可以被原生代码调用
        function updateUserInfo(params) {
            addLog('📥 原生调用了 updateUserInfo 方法', 'success');
            addLog('📦 用户信息: ' + JSON.stringify(params), 'info');
            return {
                success: true,
                message: '用户信息更新成功'
            };
        }

        // 这个方法可以被原生代码调用
        function initApp(params) {
            addLog('📥 原生调用了 initApp 方法', 'success');
            addLog('📦 初始化参数: ' + JSON.stringify(params), 'info');
            return {
                success: true,
                message: 'App 初始化成功'
            };
        }

        // 接收原生的回调
        function onTest1Success(result) {
            addLog('📥 收到原生回调: onTest1Success', 'success');
            addLog('📦 结果: ' + JSON.stringify(result), 'info');
        }

        // 测试 JS 函数
        function testJSFunction() {
            addLog('🧪 测试 JS 函数', 'info');
            const result = test({ test: 'data' });
            addLog('✅ 函数返回: ' + JSON.stringify(result), 'success');
        }

        // ==================== 页面加载完成 ====================

        window.onload = function () {
            addLog('✅ 页面加载完成', 'success');
            addLog('📱 可以开始测试 JS 交互', 'info');
        };

        // 监听错误
        window.onerror = function (message, source, lineno, colno, error) {
            addLog('❌ JS 错误: ' + message, 'error');
        };
    </script>
</body>

</html>
